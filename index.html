<script type="module" src="./src/index.ts"></script>
<script type="text/javascript">
  window.dataLayer = window.dataLayer || [];

  function gtag() {
    dataLayer.push(arguments);
  }

  gtag('js', new Date());
  gtag('config', 'G-5899C1DJM0');

  function extractYoutubeHandles(rawText) {
    const seen = new Set();
    const handles = [];

    rawText
      .replace(/\u200B|\u200C|\u200D|\uFEFF/g, '')
      .split(/\r?\n/)
      .map(v => v.trim())
      .forEach(line => {
        const match = line.match(/^@([^\s]+)$/);
        if (!match) return;

        const handle = `@${match[1]}`;
        if (seen.has(handle)) return;

        seen.add(handle);
        handles.push(handle);
      });

    return handles;
  }

  function looksLikeYoutubeCommentDump(rawText) {
    const cleaned = rawText.replace(/\u200B|\u200C|\u200D|\uFEFF/g, '');
    const lines = cleaned.split(/\r?\n/).map(v => v.trim()).filter(Boolean);

    if (lines.length < 2) return false;

    const handleLines = lines.filter(line => /^@[^\s]+$/.test(line));
    return handleLines.length >= 2;
  }

  function getNames() {
    const value = document.querySelector('#in_names').value.trim();
    if (!value) return [];

    if (looksLikeYoutubeCommentDump(value)) {
      return extractYoutubeHandles(value);
    }

    return value.split(/[,\r\n]/g).map(v => v.trim()).filter(v => !!v);
  }

  function parseName(nameStr) {
    const weightRegex = /\/(\d+(?:\.\d+)?)/;
    const countRegex = /\*(\d+)/;
    const name = /^\s*([^\/*]+)?/.exec(nameStr)?.[1]?.trim();
    const weightMatch = weightRegex.exec(nameStr);
    const countMatch = countRegex.exec(nameStr);

    if (!name) {
      return null;
    }

    return {
      name,
      weight: weightMatch ? parseFloat(weightMatch[1]) : 1,
      count: countMatch ? parseInt(countMatch[1], 10) : 1,
    };
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function formatWeight(value) {
    return Number(value.toFixed(2)).toString();
  }

  function getStoredWeights() {
    try {
      return JSON.parse(localStorage.getItem('mbr_weights') || '{}');
    } catch (e) {
      return {};
    }
  }

  function saveStoredWeights(weightMap) {
    localStorage.setItem('mbr_weights', JSON.stringify(weightMap));
  }

  function saveParticipantsSnapshot() {
    try {
      const participants = getParticipantsForWeightEditor().map((participant) => ({
        name: participant.name,
        count: participant.count,
        weight: participant.weight,
      }));
      localStorage.setItem('mbr_participants_snapshot', JSON.stringify(participants));
    } catch (e) {
      console.warn('failed to save participant snapshot', e);
    }
  }

  function isKoreanLocale() {
    const locale = (document.documentElement.lang || navigator.language || 'en').toLowerCase();
    return locale.startsWith('ko');
  }

  function getWeightSummaryMessage(participants) {
    const customizedCount = participants.filter((participant) => Math.abs(participant.weight - 1) > 0.001).length;

    if (!participants.length) {
      return isKoreanLocale()
        ? '가중치를 조절할 참가자를 먼저 입력하세요.'
        : 'Enter participants first, then adjust weights in the separate window.';
    }

    if (!customizedCount) {
      return isKoreanLocale()
        ? `총 ${participants.length}명 모두 기본 가중치(1배)`
        : `All ${participants.length} participants are using the default weight (1x).`;
    }

    return isKoreanLocale()
      ? `총 ${participants.length}명 중 ${customizedCount}명의 가중치가 조절됨`
      : `${customizedCount} of ${participants.length} participants have custom weights.`;
  }

  function importInlineWeightsToStorage() {
    const storedWeights = getStoredWeights();
    let changed = false;

    getParticipantsFromTextarea().forEach((participant) => {
      if (participant.inlineWeight !== 1 && !(typeof storedWeights[participant.name] === 'number' && storedWeights[participant.name] > 0)) {
        storedWeights[participant.name] = participant.inlineWeight;
        changed = true;
      }
    });

    if (changed) {
      saveStoredWeights(storedWeights);
    }
  }

  function renderWeightSummary() {
    const summary = document.querySelector('#weightSummary');
    if (!summary) return;

    const participants = getParticipantsForWeightEditor();
    summary.textContent = getWeightSummaryMessage(participants);
    saveParticipantsSnapshot();
  }

  function openWeightControlPopup() {
    importInlineWeightsToStorage();
    localStorage.setItem('mbr_names', document.querySelector('#in_names').value);
    saveParticipantsSnapshot();

    const popup = window.open(
      'weights_devassist.html?popupv=20260327b',
      'marbleRouletteWeightControlDevAssist',
      'popup=yes,width=760,height=900,resizable=yes,scrollbars=yes'
    );

    if (!popup) {
      simpleToast(isKoreanLocale()
        ? '팝업이 차단되었습니다. 브라우저에서 팝업을 허용한 뒤 다시 열어주세요.'
        : 'The popup was blocked. Please allow popups for this site and try again.');
      return;
    }

    popup.focus();
  }

  function getParticipantsFromTextarea() {
    const map = new Map();

    getNames().forEach((raw) => {
      const parsed = parseName(raw);
      if (!parsed) return;

      const existing = map.get(parsed.name) || {
        name: parsed.name,
        count: 0,
        inlineWeight: 1,
      };

      existing.count += parsed.count || 1;
      if (parsed.weight !== 1) {
        existing.inlineWeight = parsed.weight;
      }

      map.set(parsed.name, existing);
    });

    return Array.from(map.values());
  }

  function getParticipantsForWeightEditor() {
    const storedWeights = getStoredWeights();

    return getParticipantsFromTextarea().map((participant) => {
      const storedWeight = storedWeights[participant.name];
      return {
        name: participant.name,
        count: participant.count,
        weight: typeof storedWeight === 'number' && storedWeight > 0 ? storedWeight : (participant.inlineWeight || 1),
      };
    });
  }

  function buildWeightedNames() {
    return getParticipantsForWeightEditor().map((participant) => {
      let value = participant.name;

      if (participant.weight !== 1) {
        value += `/${formatWeight(participant.weight)}`;
      }

      if (participant.count > 1) {
        value += `*${participant.count}`;
      }

      return value;
    });
  }

  function renderWeightEditor() {
    renderWeightSummary();
  }

  function normalizeNameInput() {
    const participants = getParticipantsFromTextarea();
    const normalized = participants.map((participant) => {
      return participant.count > 1 ? `${participant.name}*${participant.count}` : participant.name;
    });

    const textarea = document.querySelector('#in_names');
    const newValue = normalized.join('\n');
    if (textarea.value !== newValue) {
      textarea.value = newValue;
    }
  }

  function syncWeightsFromEditor() {
    const weightMap = {};
    document.querySelectorAll('.weight-input').forEach((input) => {
      const name = input.dataset.name;
      const value = parseFloat(input.value);
      if (!name) return;
      weightMap[name] = !isNaN(value) && value > 0 ? value : 1;
    });
    saveStoredWeights(weightMap);
    renderWeightSummary();
  }

  function getReady() {
    const weightedNames = buildWeightedNames();
    window.roulette.setMarbles(weightedNames);
    ready = weightedNames.length > 0;
    localStorage.setItem('mbr_names', document.querySelector('#in_names').value);
    switch (winnerType) {
      case 'first':
        setWinnerRank(1);
        break;
      case 'last':
        const total = window.roulette.getCount();
        setWinnerRank(total);
        break;
    }
  }

  function setWinnerRank(rank) {
    document.querySelector('#in_winningRank').value = rank;
    window.options.winningRank = rank - 1;
    window.roulette.setWinningRank(window.options.winningRank);

    if (winnerType === 'first') {
      document.querySelector('.btn-first-winner').classList.toggle('active', true);
      document.querySelector('.btn-last-winner').classList.toggle('active', false);
      document.querySelector('#in_winningRank').classList.toggle('active', false);
    } else if (winnerType === 'last') {
      document.querySelector('.btn-first-winner').classList.toggle('active', false);
      document.querySelector('.btn-last-winner').classList.toggle('active', true);
      document.querySelector('#in_winningRank').classList.toggle('active', false);
    } else if (winnerType === 'custom') {
      document.querySelector('.btn-first-winner').classList.toggle('active', false);
      document.querySelector('.btn-last-winner').classList.toggle('active', false);
      document.querySelector('#in_winningRank').classList.toggle('active', true);
    }
  }


  let ready = false;
  let winnerType = 'first';

  document.addEventListener('DOMContentLoaded', () => {
    initialize();
  });

  function initialize() {
    if (!window.roulette || !window.roulette.isReady) {
      console.log('does not loaded yet');
      setTimeout(initialize, 100);
      return;
    }
    console.log('initializing start');

    const urlParams = new URLSearchParams(window.location.search);
    const namesFromUrl = urlParams.get('names');

    if (namesFromUrl) {
      document.querySelector('#in_names').value = namesFromUrl.replace(/,/g, '\n');
    } else {
      const savedNames = localStorage.getItem('mbr_names');
      if (savedNames) {
        document.querySelector('#in_names').value = savedNames;
      }
    }
    document.querySelector('#in_names').addEventListener('input', () => {
      renderWeightEditor();
      getReady();
    });

    document.querySelector('#in_names').addEventListener('paste', () => {
      requestAnimationFrame(() => {
        normalizeNameInput();
        renderWeightEditor();
        getReady();
      });
    });

    document.querySelector('#in_names').addEventListener('blur', () => {
      normalizeNameInput();
      renderWeightEditor();
      getReady();
    });
    const weightRows = document.querySelector('#weightRows');
    if (weightRows) {
      weightRows.addEventListener('input', (e) => {
        if (!e.target.classList.contains('weight-input')) return;
        syncWeightsFromEditor();
        getReady();
      });
    }

    document.querySelector('#btnOpenWeightPopup').addEventListener('click', () => {
      openWeightControlPopup();
    });

    window.addEventListener('storage', (event) => {
      if (event.key === 'mbr_weights') {
        renderWeightEditor();
        getReady();
      }
    });

    document.querySelector('#btnShuffle').addEventListener('click', () => {
      getReady();
    });

    document.querySelector('#btnStart').addEventListener('click', () => {
      if (!ready) return;
      gtag && gtag('event', 'start', {
        'event_category': 'roulette',
        'event_label': 'start',
        'value': window.roulette.getCount(),
      });
      const names = buildWeightedNames();
      const marbles = names.map((n) => {
        const p = parseName(n);
        return p ? { name: p.name, count: p.count } : null;
      }).filter(Boolean);
      if (typeof umami !== 'undefined') {
        umami.track('start', { count: window.roulette.getCount() });
        marbles.forEach(m => {
          umami.track('marble', { name: m.name, count: m.count });
        });
      }
      window.roulette.start();
      document.querySelector('#settings').classList.add('hide');
      document.querySelector('#donate').classList.add('hide');
    });

    document.querySelector('#chkAutoRecording').addEventListener('change', (e) => {
      window.options.autoRecording = e.target.matches(':checked');
      window.roulette.setAutoRecording(window.options.autoRecording);
    });

    document.querySelector('#chkSkill').addEventListener('change', (e) => {
      window.options.useSkills = e.target.matches(':checked');
      window.roulette.setWinningRank(window.options.winningRank);
    });

    document.querySelector('#chkDarkMode').addEventListener('change', (e) => {
      window.options.darkMode = e.target.matches(':checked');
      window.roulette.setTheme(window.options.darkMode ? 'dark' : 'light');
      document.documentElement.classList.toggle('light', !window.options.darkMode);
    });

    document.querySelector('#in_winningRank').addEventListener('change', (e) => {
      const v = parseInt(e.target.value, 10);
      winnerType = 'custom';
      setWinnerRank(isNaN(v) ? 0 : v);
    });

    document.querySelector('.btn-last-winner').addEventListener('click', () => {
      const total = window.roulette.getCount();
      winnerType = 'last';
      setWinnerRank(total);
    });
    document.querySelector('.btn-first-winner').addEventListener('click', () => {
      winnerType = 'first';
      setWinnerRank(1);
    });

    window.roulette.addEventListener('goal', () => {
      ready = false;
      setTimeout(() => {
        document.querySelector('#settings').classList.remove('hide');
        document.querySelector('#donate').classList.remove('hide');
      }, 3000);
    });

    window.roulette.addEventListener('message', (e) => {
      simpleToast(e.detail);
    });

    const toggleBtn = document.querySelector('#btnToggleSettings');
    const collapsible = document.querySelector('.collapsible-rows');
    toggleBtn.addEventListener('click', () => {
      collapsible.classList.toggle('collapsed');
      toggleBtn.querySelector('.toggle-arrow').textContent =
        collapsible.classList.contains('collapsed') ? '▲' : '▼';
    });

    renderWeightEditor();
    getReady();
    document.querySelector('#btnShuffle').click();

    const maps = window.roulette.getMaps();
    const mapSelector = document.querySelector('#sltMap');
    maps.forEach((map) => {
      const option = document.createElement('option');
      option.value = map.index;
      option.innerHTML = map.title;
      option.setAttribute('data-trans', '');
      window.translateElement(option);
      mapSelector.append(option);
    });
    mapSelector.addEventListener('change', (e) => {
      const index = e.target.value;
      window.roulette.setMap(index);
    });

    // const checkDonateButtonLoaded = () => {
    //   const btn = document.querySelector('span.bmc-btn-text');
    //   if (!btn) {
    //     setTimeout(checkDonateButtonLoaded, 100);
    //   } else {
    //     console.log('donation button has been loaded');
    //     btn.setAttribute('data-trans', '');
    //     window.translateElement(btn);
    //   }
    // };
    // setTimeout(checkDonateButtonLoaded, 100);

    const currentNotice = 5;
    const noticeKey = 'lastViewedNotification';

    const closeNotice = () => {
      document.querySelector('#notice').style.display = 'none';
      localStorage.setItem(noticeKey, currentNotice.toString());
    };

    const openNotice = () => {
      console.log('openNotice');
      document.querySelector('#notice').style.display = 'flex';
    };

    document.querySelector('#closeNotice').addEventListener('click', () => {
      closeNotice();
    });

    document.querySelector('#btnNotice').addEventListener('click', () => {
      openNotice();
    });

    function simpleToast(msg) {
      const toast = document.createElement('div');
      toast.classList.add('toast');
      toast.innerHTML = msg;

      if (window.translateElement) {
        console.log('try to translate');
        window.translateElement(toast);
      }

      document.body.appendChild(toast);
      setTimeout(() => {
        document.body.removeChild(toast);
      }, 1200);
    }

    const checkNotice = () => {
      const lastViewed = localStorage.getItem(noticeKey);
      console.log('lastViewed', lastViewed);
      if (lastViewed === null || Number(lastViewed) < currentNotice) {
        openNotice();
      }
    };

    checkNotice();
  }
</script>

  <div class="left">

  </div>
</div>

</div>
